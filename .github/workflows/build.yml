name: Build standalone apps

# Builds PlayStation Studio for macOS, Windows and Linux.
# PyInstaller can't cross-compile, so each OS builds on its own runner.
# Trigger manually (Actions → Build standalone apps → Run) or on a version tag.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: PlayStation-Studio-Windows
          - os: macos-latest
            artifact: PlayStation-Studio-macOS
          - os: ubuntu-latest
            artifact: PlayStation-Studio-Linux
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Linux needs a few system libs for headless Qt rendering of the icons.
      - name: Install Qt system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ./MkPFS pyinstaller pillow

      - name: Generate icons
        run: python -m playstation_studio.assets.build_icons
        env:
          QT_QPA_PLATFORM: offscreen

      - name: Build
        run: pyinstaller --noconfirm playstation_studio.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
