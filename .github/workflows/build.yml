name: Build & Release

# Builds standalone PlayStation Studio apps for macOS and Windows.
# - Push a version tag (e.g. v1.0.0) → builds + publishes a GitHub Release
#   with the downloadable zips attached.
# - Run manually (Actions → Build & Release → Run) → builds + uploads the
#   zips as workflow artifacts (no release).

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write          # needed to create the Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
          - os: windows-latest
            name: Windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ./MkPFS pyinstaller pillow

      - name: Generate icons
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m playstation_studio.assets.build_icons

      - name: Build
        shell: bash
        run: pyinstaller --noconfirm playstation_studio.spec

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent "dist/PlayStation Studio.app" "PlayStation-Studio-macOS.zip"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "dist/PlayStation Studio" -DestinationPath "PlayStation-Studio-Windows.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlayStation-Studio-${{ matrix.name }}
          path: PlayStation-Studio-${{ matrix.name }}.zip

      - name: Attach to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: PlayStation-Studio-${{ matrix.name }}.zip
          generate_release_notes: true
